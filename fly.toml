app = "fly-code"
primary_region = "sin"
kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]

[env]
  PHX_HOST = "fly-code.fly.dev"
  FLAME_BACKEND = "Fly"
  ECTO_IPV6 = "true"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
